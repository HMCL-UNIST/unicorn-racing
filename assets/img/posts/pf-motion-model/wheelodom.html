<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg-color: #f8f9fa;
    --canvas-bg: #ffffff;
    --border-color: #dee2e6;
    --text-primary: #212529;
    --text-secondary: #6c757d;
    --gt-color: #20c997;
    --particle-color: rgba(255, 107, 107, 0.15);
    --particle-end-color: rgba(255, 107, 107, 0.6);
    --slip-color: #339af0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-color: #212529;
      --canvas-bg: #2b3035;
      --border-color: #495057;
      --text-primary: #f8f9fa;
      --text-secondary: #adb5bd;
      --gt-color: #12b886;
      --particle-color: rgba(255, 107, 107, 0.15);
      --particle-end-color: rgba(255, 107, 107, 0.6);
      --slip-color: #4dabf7;
    }
  }
  .odom-container {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-color);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    color: var(--text-primary);
  }
  .odom-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
  }
  .slider-group {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .slider-group label {
    font-size: 13px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
  }
  .slider-group input[type="range"] {
    width: 100%;
    cursor: pointer;
  }
  .odom-info {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  #odom-canvas {
    width: 100%;
    height: auto;
    background: var(--canvas-bg);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    display: block;
  }
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    font-size: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
</style></head><body>

<div class="odom-container">
  <div class="odom-controls">
    <div class="slider-group">
      <label>
        <span>Translational Noise (Proportional to Distance)</span>
        <span id="val-trans">0.10</span>
      </label>
      <input type="range" id="slider-trans" min="0" max="0.4" step="0.01" value="0.10">
    </div>
    <div class="slider-group">
      <label>
        <span>Rotational Noise (Cumulative)</span>
        <span id="val-rot">0.05</span>
      </label>
      <input type="range" id="slider-rot" min="0" max="0.2" step="0.005" value="0.05">
    </div>
  </div>
  
  <p class="odom-info">
    As the vehicle moves forward, errors accumulate, and you can see the particles spreading largely in a banana shape.
  </p>

  <canvas id="odom-canvas" width="700" height="400"></canvas>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background: var(--gt-color)"></div> Ideal Path</div>
    <div class="legend-item"><div class="dot" style="background: rgba(255, 107, 107, 0.6)"></div> Particle Distribution (Spreads as it progresses)</div>
    <div class="legend-item"><div class="dot" style="background: var(--slip-color)"></div> Actual Vehicle Position (Slip)</div>
  </div>
</div>


<script>
(function(){
  const canvas = document.getElementById('odom-canvas');
  const ctx = canvas.getContext('2d');
  const sliderTrans = document.getElementById('slider-trans');
  const sliderRot = document.getElementById('slider-rot');
  const valTrans = document.getElementById('val-trans');
  const valRot = document.getElementById('val-rot');

  function randn_bm() {
    let u = 0, v = 0;
    while(u === 0) u = Math.random();
    while(v === 0) v = Math.random();
    return Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
  }

  const commands = [
    {d: 100, a: 0},
    {d: 120, a: Math.PI / 10},
    {d: 150, a: Math.PI / 8},
    {d: 180, a: Math.PI / 12}
  ];

  function simulate() {
    const style = getComputedStyle(document.body);
    const gtColor = style.getPropertyValue('--gt-color').trim() || '#20c997';
    const particleColor = style.getPropertyValue('--particle-color').trim() || 'rgba(255, 107, 107, 0.15)';
    const particleEndColor = style.getPropertyValue('--particle-end-color').trim() || 'rgba(255, 107, 107, 0.6)';
    const slipColor = style.getPropertyValue('--slip-color').trim() || '#339af0';

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const startX = 50;
    const startY = 320;
    
    // Draw ideal path
    let gtX = startX;
    let gtY = startY;
    let gtTheta = 0;
    
    ctx.beginPath();
    ctx.moveTo(gtX, gtY);
    for(let cmd of commands) {
      gtTheta += cmd.a;
      gtX += cmd.d * Math.cos(gtTheta);
      gtY -= cmd.d * Math.sin(gtTheta);
      ctx.lineTo(gtX, gtY);
    }
    ctx.strokeStyle = gtColor;
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Actual trajectory with slip
    let slipX = startX;
    let slipY = startY;
    let slipTheta = 0;
    for(let cmd of commands) {
      slipTheta += cmd.a - 0.04; 
      slipX += (cmd.d * 0.90) * Math.cos(slipTheta);
      slipY -= (cmd.d * 0.90) * Math.sin(slipTheta);
    }
    
    ctx.beginPath();
    ctx.arc(slipX, slipY, 6, 0, 2 * Math.PI);
    ctx.fillStyle = slipColor;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Scatter particles (drawn step-by-step to show spreading)
    const nTrans = parseFloat(sliderTrans.value);
    const nRot = parseFloat(sliderRot.value);
    const numParticles = 1000;

    for(let i=0; i<numParticles; i++) {
      let px = startX;
      let py = startY;
      let pTheta = 0;

      for(let step = 0; step < commands.length; step++) {
        let cmd = commands[step];
        
        // Set rotational noise to increase with movement distance (maximize banana shape)
        let noisyA = cmd.a + randn_bm() * (nRot + nTrans * 0.02 * cmd.d);
        let noisyD = cmd.d + randn_bm() * (nTrans * cmd.d);
        
        pTheta += noisyA;
        px += noisyD * Math.cos(pTheta);
        py -= noisyD * Math.sin(pTheta);

        ctx.beginPath();
        if (step === commands.length - 1) {
            ctx.fillStyle = particleEndColor;
            ctx.arc(px, py, 1.5, 0, 2 * Math.PI);
        } else {
            ctx.fillStyle = particleColor;
            ctx.arc(px, py, 1.0, 0, 2 * Math.PI);
        }
        ctx.fill();
      }
    }
  }

  function update() {
    valTrans.textContent = sliderTrans.value;
    valRot.textContent = sliderRot.value;
    simulate();
  }

  sliderTrans.addEventListener('input', update);
  sliderRot.addEventListener('input', update);

  setTimeout(update, 100);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', simulate);
})();
</script></body></html>
